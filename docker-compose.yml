services:
  postgres:
    image: postgres:16-alpine
    container_name: uni-ms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uni_ms}
      POSTGRES_USER: ${DB_USER:-uni_ms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-uni_ms}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - uni-ms-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  uni-ms-postgres-data:
