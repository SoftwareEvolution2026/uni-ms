spring:
  application:
    name: uni-ms
  datasource:
    # Default driver is MySQL Connector/J. MariaDB users activate the 'mariadb' profile
    # (SPRING_PROFILES_ACTIVE=mariadb) which overrides this URL — see application-mariadb.yml.
    url: ${DB_URL:jdbc:mysql://localhost:3306/uni_ms?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; JPA only validates it
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-to-a-long-random-secret-at-least-32-chars}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

server:
  port: ${PORT:8081}   # 8080 is often taken by XAMPP/Apache; override with PORT env var
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    org.springframework.security: INFO
