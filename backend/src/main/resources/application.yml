spring:
  application:
    name: uni-ms
  profiles:
    default: local
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration/postgresql
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: ${JWT_ISSUER:uni-ms}
    audience: ${JWT_AUDIENCE:uni-ms-api}
    clock-skew-seconds: ${JWT_CLOCK_SKEW_SECONDS:30}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  security:
    login-attempts:
      max-failures: ${LOGIN_MAX_FAILURES:5}
      window: ${LOGIN_FAILURE_WINDOW:15m}
  initial-admin:
    enabled: ${INITIAL_ADMIN_ENABLED:false}
    name: ${INITIAL_ADMIN_NAME:}
    email: ${INITIAL_ADMIN_EMAIL:}
    password: ${INITIAL_ADMIN_PASSWORD:}

server:
  port: ${PORT:8081}
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
